name: Release

on:
  push:
    tags: ['v*']

concurrency:
  group: seedbed-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  package:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      sha256: ${{ steps.package.outputs.sha256 }}
      artifact_id: ${{ steps.upload.outputs.artifact-id }}
      artifact_digest: ${{ steps.upload.outputs.artifact-digest }}
      staging_artifact_id: ${{ steps.upload-staging.outputs.artifact-id }}
      staging_artifact_digest: ${{ steps.upload-staging.outputs.artifact-digest }}
      integrity: ${{ steps.package.outputs.integrity }}
      version: ${{ steps.identity.outputs.version }}
      closure_sha256: ${{ steps.closure.outputs.sha256 }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - id: identity
        shell: bash
        run: |
          tag="${{ github.ref_name }}"
          [[ "$tag" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]
          test "${{ vars.IMMUTABLE_RELEASES_VERIFIED_FOR }}" = "$tag"
          version="${BASH_REMATCH[1]}"
          test "$(git cat-file -t "refs/tags/$tag")" = tag
          tag_commit=$(git rev-parse "refs/tags/$tag^{commit}")
          test "$tag_commit" = "$(git rev-parse HEAD)"
          test "$tag_commit" = "${{ github.sha }}"
          git fetch --no-tags origin main
          git merge-base --is-ancestor "$tag_commit" origin/main
          test "$(node -p "require('./package.json').version")" = "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "commit=$tag_commit" >> "$GITHUB_OUTPUT"
      - run: npm ci
      - run: npm run check
      - id: package
        name: Pack and verify the exact publication tarball without credentials
        env:
          RUN_ATTEMPT: ${{ github.run_attempt }}
          SEEDBED_VERSION: ${{ steps.identity.outputs.version }}
        shell: bash
        run: |
          publication_dir="$RUNNER_TEMP/npm-publication"
          mkdir "$publication_dir"
          pack_json="$publication_dir/npm-pack.json"
          packed_manifest="$publication_dir/packed-package.json"
          npm pack --json --pack-destination "$publication_dir" > "$pack_json"
          filename=$(node -p "JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8'))[0].filename" "$pack_json")
          integrity=$(node -p "JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8'))[0].integrity" "$pack_json")
          source="$publication_dir/$filename"
          test "$filename" = "$(basename "$filename")"
          test -f "$source"
          actual_integrity="sha512-$(openssl dgst -sha512 -binary "$source" | openssl base64 -A)"
          test "$actual_integrity" = "$integrity"
          sha256=$(sha256sum "$source" | cut -d ' ' -f 1)
          [[ "$sha256" =~ ^[0-9a-f]{64}$ ]]
          [[ "$RUN_ATTEMPT" =~ ^[0-9]+$ ]]
          filename="seedbed-publication-$sha256.tgz"
          artifact_name="seedbed-npm-$sha256-attempt-$RUN_ATTEMPT"
          tarball="$publication_dir/$filename"
          mv -- "$source" "$tarball"
          tar -xOf "$tarball" package/package.json > "$packed_manifest"
          test "$(node -p "JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8')).name" "$packed_manifest")" = "@gnolith/seedbed"
          test "$(node -p "JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8')).version" "$packed_manifest")" = "$SEEDBED_VERSION"
          printf '{"sha256":"%s","name":"@gnolith/seedbed","version":"%s","filename":"%s"}\n' \
            "$sha256" "$SEEDBED_VERSION" "$filename" > "$publication_dir/seedbed-publication.json"
          rm -- "$pack_json" "$packed_manifest"
          echo "sha256=$sha256" >> "$GITHUB_OUTPUT"
          echo "integrity=$integrity" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"
      - name: Fail closed on existing npm, GHCR, or GitHub Release state
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXPECTED_INTEGRITY: ${{ steps.package.outputs.integrity }}
          SEEDBED_VERSION: ${{ steps.identity.outputs.version }}
          RELEASE_TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          node scripts/release-preflight.mjs npm \
            "https://registry.npmjs.org/@gnolith%2fseedbed/$SEEDBED_VERSION" \
            '@gnolith/seedbed' "$SEEDBED_VERSION" "$EXPECTED_INTEGRITY" \
            | tee "$RUNNER_TEMP/npm-preflight.json"
          node scripts/release-preflight.mjs ghcr \
            'https://api.github.com/orgs/gnolith/packages/container/seedbed/versions?per_page=100&state=active' \
            "$SEEDBED_VERSION" | tee "$RUNNER_TEMP/ghcr-preflight.json"
          node scripts/release-preflight.mjs release \
            "https://api.github.com/repos/gnolith/seedbed/releases/tags/$RELEASE_TAG" \
            "$RELEASE_TAG" | tee "$RUNNER_TEMP/release-preflight.json"
      - id: upload
        name: Upload the content-addressed publication artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: |
            ${{ runner.temp }}/npm-publication/seedbed-publication-${{ steps.package.outputs.sha256 }}.tgz
            ${{ runner.temp }}/npm-publication/seedbed-publication.json
          if-no-files-found: error
          compression-level: 0
          retention-days: 30
      - name: Stage and verify exact public component artifacts before publication
        shell: bash
        run: |
          stage_component() {
            package="$1"
            version="$2"
            filename="$3"
            expected_sha256="$4"
            metadata="$RUNNER_TEMP/${filename%.tgz}-metadata.json"
            pack="$RUNNER_TEMP/${filename%.tgz}-pack.json"
            npm view "$package@$version" --json > "$metadata"
            test "$(node -p "JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8')).name" "$metadata")" = "$package"
            test "$(node -p "JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8')).version" "$metadata")" = "$version"
            test "$(node -p "JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8')).dist.attestations?.provenance?.predicateType || ''" "$metadata")" = 'https://slsa.dev/provenance/v1'
            npm pack "$package@$version" --json > "$pack"
            test "$(node -p "JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8'))[0].filename" "$pack")" = "$filename"
            test "$(node -p "JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8'))[0].integrity" "$pack")" = \
              "$(node -p "JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8')).dist.integrity" "$metadata")"
            echo "$expected_sha256  $filename" | sha256sum --check
          }
          stage_component '@gnolith/diamond' '0.4.0' 'gnolith-diamond-0.4.0.tgz' \
            'ac8e34810a8504bd891b36a199973f2d65ef652555644813c7a36f1c7016c9d2'
          stage_component '@gnolith/taproot' '0.3.0' 'gnolith-taproot-0.3.0.tgz' \
            '2faf3d9bce7811da3fd61629a4cd8b63bb0a6de861d77347030b216ff3ccc347'
          stage_component '@gnolith/workshop' '0.3.3' 'gnolith-workshop-0.3.3.tgz' \
            'c2bc2f3763a3d693662b584d0ed2270936644ab3d23ecd699f0f8b4a2ed0cdc3'
          npm audit signatures
      - name: Test the exact staged package assembly before publication
        env:
          DIAMOND_TGZ: ${{ github.workspace }}/gnolith-diamond-0.4.0.tgz
          TAPROOT_TGZ: ${{ github.workspace }}/gnolith-taproot-0.3.0.tgz
          WORKSHOP_TGZ: ${{ github.workspace }}/gnolith-workshop-0.3.3.tgz
        run: npm run test:packed
      - id: closure
        name: Stage the locked production closure before publication
        env:
          SEEDBED_INTEGRITY: ${{ steps.package.outputs.integrity }}
          SEEDBED_SHA256: ${{ steps.package.outputs.sha256 }}
        shell: bash
        run: |
          seedbed="$RUNNER_TEMP/npm-publication/seedbed-publication-$SEEDBED_SHA256.tgz"
          bash scripts/build-production-closure.sh \
            "$seedbed" "$SEEDBED_INTEGRITY" \
            gnolith-diamond-0.4.0.tgz \
            gnolith-taproot-0.3.0.tgz \
            gnolith-workshop-0.3.3.tgz
          closure_sha=$(cut -d ' ' -f 1 gnolith-production-closure.tar.gz.sha256)
          [[ "$closure_sha" =~ ^[0-9a-f]{64}$ ]]
          echo "sha256=$closure_sha" >> "$GITHUB_OUTPUT"
      - name: Build and functionally verify the staged image before publication
        env:
          CLOSURE_SHA256: ${{ steps.closure.outputs.sha256 }}
          SEEDBED_CLOSURE_SHA256: ${{ steps.closure.outputs.sha256 }}
        shell: bash
        run: |
          docker build \
            --build-arg PRODUCTION_CLOSURE_SHA256="$CLOSURE_SHA256" \
            --build-arg REVISION=${{ steps.identity.outputs.commit }} \
            --tag seedbed:release-candidate .
          SEEDBED_TEST_IMAGE=seedbed:release-candidate npm run test:docker
      - id: upload-staging
        name: Upload the verified release staging evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: seedbed-staging-${{ steps.package.outputs.sha256 }}-attempt-${{ github.run_attempt }}
          path: |
            gnolith-production-closure.tar.gz
            gnolith-production-closure.tar.gz.sha256
            docs/mcp-runtime-sbom.json
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

  publish:
    needs: package
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - name: Install the SHA-verified npm toolchain without checkout
        shell: bash
        run: |
          archive=node-v24.14.0-linux-x64.tar.xz
          expected=41cd79bb7877c81605a9e68ec4c91547774f46a40c67a17e34d7179ef11729df
          install_root="$RUNNER_TEMP/node-v24.14.0-linux-x64"
          curl --fail --silent --show-error --location --connect-timeout 5 --max-time 30 --proto '=https' --tlsv1.2 \
            --output "$RUNNER_TEMP/$archive" "https://nodejs.org/dist/v24.14.0/$archive"
          echo "$expected  $RUNNER_TEMP/$archive" | sha256sum --check
          tar --extract --xz --file "$RUNNER_TEMP/$archive" --directory "$RUNNER_TEMP"
          echo "$install_root/bin" >> "$GITHUB_PATH"
      - name: Verify the trusted npm toolchain
        shell: bash
        run: |
          test "$(node --version)" = "v24.14.0"
          test "$(npm --version)" = "11.9.0"
      - name: Download the content-addressed publication artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          artifact-ids: ${{ needs.package.outputs.artifact_id }}
          path: ${{ runner.temp }}/npm-publication
          merge-multiple: true
      - name: Reverify and publish with npm trusted publishing
        env:
          EXPECTED_SHA256: ${{ needs.package.outputs.sha256 }}
          EXPECTED_ARTIFACT_ID: ${{ needs.package.outputs.artifact_id }}
          EXPECTED_ARTIFACT_DIGEST: ${{ needs.package.outputs.artifact_digest }}
          EXPECTED_COMMIT: ${{ github.sha }}
          RELEASE_TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          [[ "$RELEASE_TAG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]
          expected_version="${BASH_REMATCH[1]}"
          [[ "$EXPECTED_SHA256" =~ ^[0-9a-f]{64}$ ]]
          [[ "$EXPECTED_ARTIFACT_ID" =~ ^[0-9]+$ ]]
          [[ "$EXPECTED_ARTIFACT_DIGEST" =~ ^(sha256:)?[0-9a-f]{64}$ ]]
          [[ "$EXPECTED_COMMIT" =~ ^[0-9a-f]{40}$ ]]
          expected_ref="refs/tags/$RELEASE_TAG"
          expected_filename="seedbed-publication-$EXPECTED_SHA256.tgz"
          publication_dir="$RUNNER_TEMP/npm-publication"
          tarball="$publication_dir/$expected_filename"
          metadata="$publication_dir/seedbed-publication.json"
          test "$(find "$publication_dir" -mindepth 1 -maxdepth 1 | wc -l)" -eq 2
          test -f "$tarball" && test ! -L "$tarball"
          test -f "$metadata" && test ! -L "$metadata"
          test "$(stat -c %F "$tarball")" = "regular file"
          test "$(stat -c %F "$metadata")" = "regular file"
          test "$(sha256sum "$tarball" | cut -d ' ' -f 1)" = "$EXPECTED_SHA256"
          test "$(node -p "JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8')).sha256" "$metadata")" = "$EXPECTED_SHA256"
          test "$(node -p "JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8')).filename" "$metadata")" = "$expected_filename"
          test "$(node -p "JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8')).name" "$metadata")" = "@gnolith/seedbed"
          test "$(node -p "JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8')).version" "$metadata")" = "$expected_version"
          python3 - "$tarball" "$expected_version" <<'PY'
          import json
          import sys
          import tarfile

          tarball, expected_version = sys.argv[1:]
          with tarfile.open(tarball, mode='r:gz') as archive:
              members = archive.getmembers()
              names = [member.name for member in members]
              if len(names) != len(set(names)):
                  raise SystemExit('duplicate archive member')
              for member in members:
                  name = member.name
                  if not name or name.startswith(('/', '\\')) or '\\' in name:
                      raise SystemExit(f'unsafe archive path: {name!r}')
                  if any(ord(character) < 32 or ord(character) == 127 for character in name):
                      raise SystemExit(f'control character in archive path: {name!r}')
                  parts = name.split('/')
                  if any(part in ('', '.', '..') for part in parts):
                      raise SystemExit(f'ambiguous archive path: {name!r}')
                  if parts[0] != 'package':
                      raise SystemExit(f'archive member outside package/: {name!r}')
                  if not (member.isfile() or member.isdir()):
                      raise SystemExit(f'unsupported archive member type: {name!r}')
              manifests = [member for member in members if member.name == 'package/package.json']
              if len(manifests) != 1 or not manifests[0].isfile():
                  raise SystemExit('package/package.json must be one regular file')
              manifest_file = archive.extractfile(manifests[0])
              if manifest_file is None:
                  raise SystemExit('package/package.json is unreadable')
              manifest = json.load(manifest_file)
          if manifest.get('name') != '@gnolith/seedbed':
              raise SystemExit('unexpected package name')
          if manifest.get('version') != expected_version:
              raise SystemExit('unexpected package version')
          PY
          expected_sha512_hex=$(sha512sum "$tarball" | cut -d ' ' -f 1)
          expected_integrity="sha512-$(openssl dgst -sha512 -binary "$tarball" | openssl base64 -A)"
          registry_response="$RUNNER_TEMP/npm-registry-version.json"
          root_packument="$RUNNER_TEMP/npm-registry-packument.json"
          registry_url="https://registry.npmjs.org/@gnolith%2fseedbed/$expected_version"
          root_packument_url="https://registry.npmjs.org/@gnolith%2fseedbed"
          audit_dir="$RUNNER_TEMP/npm-provenance-audit"
          registry_ready() {
            registry_status=$(curl --silent --show-error --location --connect-timeout 5 --max-time 15 \
              --output "$registry_response" --write-out '%{http_code}' "$registry_url")
            root_packument_status=$(curl --silent --show-error --location --connect-timeout 5 --max-time 15 \
              --output "$root_packument" --write-out '%{http_code}' "$root_packument_url")
            test "$registry_status" = 200 || return 1
            test "$root_packument_status" = 200 || return 1
            node - "$registry_response" "$root_packument" "$expected_version" "$expected_integrity" <<'NODE' || return 1
          const fs = require('fs');
          const [versionPath, packumentPath, version, integrity] = process.argv.slice(2);
          const exact = JSON.parse(fs.readFileSync(versionPath, 'utf8'));
          const packument = JSON.parse(fs.readFileSync(packumentPath, 'utf8'));
          if (exact.name !== '@gnolith/seedbed' || exact.version !== version) process.exit(1);
          if (exact.dist?.integrity !== integrity) process.exit(1);
          if (exact.dist?.attestations?.url !== `https://registry.npmjs.org/-/npm/v1/attestations/@gnolith%2fseedbed@${version}`) process.exit(1);
          if (exact.dist?.attestations?.provenance?.predicateType !== 'https://slsa.dev/provenance/v1') process.exit(1);
          const rootVersion = packument.versions?.[version];
          if (rootVersion?.name !== '@gnolith/seedbed' || rootVersion.version !== version) process.exit(1);
          if (rootVersion.dist?.integrity !== integrity) process.exit(1);
          NODE
            rm -rf "$audit_dir" || return 1
            mkdir "$audit_dir" || return 1
            cd "$audit_dir" || return 1
            npm init --yes >/dev/null || return 1
            npm install --ignore-scripts --save-exact "@gnolith/seedbed@$expected_version" || return 1
            test "$(node -p "JSON.parse(require('fs').readFileSync('node_modules/@gnolith/seedbed/package.json', 'utf8')).name")" = "@gnolith/seedbed" || return 1
            test "$(node -p "JSON.parse(require('fs').readFileSync('node_modules/@gnolith/seedbed/package.json', 'utf8')).version")" = "$expected_version" || return 1
            test "$(node -p "JSON.parse(require('fs').readFileSync('package-lock.json', 'utf8')).packages['node_modules/@gnolith/seedbed'].integrity")" = "$expected_integrity" || return 1
            cd "$RUNNER_TEMP" || return 1
          }
          wait_for_registry() {
            for attempt in {1..12}; do
              if registry_ready; then
                return 0
              fi
              cd "$RUNNER_TEMP"
              echo "Exact npm packument and install evidence is not yet complete (attempt $attempt/12)."
              sleep 5
            done
            echo "npm registry propagation did not produce exact packument and install evidence" >&2
            return 1
          }
          verify_registry_provenance() {
            test "$(node -p "JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8')).name" "$registry_response")" = "@gnolith/seedbed"
            test "$(node -p "JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8')).version" "$registry_response")" = "$expected_version"
            test "$(node -p "JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8')).dist.integrity" "$registry_response")" = "$expected_integrity"
            attestations_url=$(node -p "JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8')).dist.attestations?.url || ''" "$registry_response")
            provenance_type=$(node -p "JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8')).dist.attestations?.provenance?.predicateType || ''" "$registry_response")
            test "$attestations_url" = "https://registry.npmjs.org/-/npm/v1/attestations/@gnolith%2fseedbed@$expected_version"
            test "$provenance_type" = "https://slsa.dev/provenance/v1"
            cd "$audit_dir"
            npm audit signatures | tee "$RUNNER_TEMP/npm-signature-audit.txt"
            grep -Eq '[1-9][0-9]* packages? (has|have) (a )?verified attestations?' "$RUNNER_TEMP/npm-signature-audit.txt"
            attestation_response="$RUNNER_TEMP/npm-provenance-attestations.json"
            curl --fail --silent --show-error --location --connect-timeout 5 --max-time 15 \
              --output "$attestation_response" "$attestations_url"
            node - "$attestation_response" "$expected_version" "$expected_sha512_hex" "$expected_ref" "$EXPECTED_COMMIT" <<'NODE'
          const fs = require('fs');
          const [path, version, sha512, ref, commit] = process.argv.slice(2);
          const response = JSON.parse(fs.readFileSync(path, 'utf8'));
          const attestations = response.attestations?.filter(
            ({ predicateType }) => predicateType === 'https://slsa.dev/provenance/v1',
          ) ?? [];
          if (attestations.length !== 1) throw new Error('expected exactly one SLSA v1 provenance attestation');
          const envelope = attestations[0].bundle?.dsseEnvelope;
          if (envelope?.payloadType !== 'application/vnd.in-toto+json') throw new Error('unexpected DSSE payload type');
          const statement = JSON.parse(Buffer.from(envelope.payload, 'base64').toString('utf8'));
          if (statement._type !== 'https://in-toto.io/Statement/v1') throw new Error('unexpected statement type');
          if (statement.predicateType !== 'https://slsa.dev/provenance/v1') throw new Error('unexpected predicate type');
          const subjects = statement.subject ?? [];
          if (subjects.length !== 1) throw new Error('expected one provenance subject');
          if (subjects[0].name !== `pkg:npm/%40gnolith/seedbed@${version}`) throw new Error('unexpected provenance subject');
          if (subjects[0].digest?.sha512 !== sha512) throw new Error('provenance subject digest mismatch');
          const build = statement.predicate?.buildDefinition;
          if (build?.buildType !== 'https://slsa-framework.github.io/github-actions-buildtypes/workflow/v1') {
            throw new Error('unexpected provenance build type');
          }
          const workflow = build.externalParameters?.workflow;
          if (workflow?.repository !== 'https://github.com/gnolith/seedbed') throw new Error('unexpected provenance repository');
          if (workflow?.path !== '.github/workflows/release.yml') throw new Error('unexpected provenance workflow');
          if (workflow?.ref !== ref) throw new Error('unexpected provenance ref');
          const dependencies = build.resolvedDependencies ?? [];
          const source = dependencies.filter(({ uri }) => uri === `git+https://github.com/gnolith/seedbed@${ref}`);
          if (source.length !== 1 || source[0].digest?.gitCommit !== commit) {
            throw new Error('unexpected provenance source commit');
          }
          NODE
          }
          registry_status=$(curl --silent --show-error --location --connect-timeout 5 --max-time 15 \
            --output "$registry_response" --write-out '%{http_code}' "$registry_url")
          if test "$registry_status" = 200; then
            wait_for_registry
            verify_registry_provenance
            echo "The exact npm artifact is already public; publication recovery is complete."
            exit 0
          fi
          test "$registry_status" = 404
          cd "$RUNNER_TEMP"
          npm publish "$tarball" --ignore-scripts --access public --provenance
          wait_for_registry
          verify_registry_provenance

  image:
    needs: [package, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      closure_sha256: ${{ steps.closure.outputs.sha256 }}
      evidence_artifact_id: ${{ steps.upload-image-evidence.outputs.artifact-id }}
      evidence_artifact_digest: ${{ steps.upload-image-evidence.outputs.artifact-digest }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - run: npm config set registry https://registry.npmjs.org
      - run: npm ci --ignore-scripts
      - name: Stage and verify the exact component artifacts
        shell: bash
        run: |
          stage_component() {
            package="$1"
            version="$2"
            filename="$3"
            expected_sha256="$4"
            metadata="$RUNNER_TEMP/${filename%.tgz}-metadata.json"
            pack="$RUNNER_TEMP/${filename%.tgz}-pack.json"
            npm view "$package@$version" --json > "$metadata"
            test "$(node -p "JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8')).name" "$metadata")" = "$package"
            test "$(node -p "JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8')).version" "$metadata")" = "$version"
            test "$(node -p "JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8')).dist.attestations?.provenance?.predicateType || ''" "$metadata")" = 'https://slsa.dev/provenance/v1'
            test -n "$(node -p "JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8')).dist.attestations?.url || ''" "$metadata")"
            npm pack "$package@$version" --json > "$pack"
            test "$(node -p "JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8'))[0].filename" "$pack")" = "$filename"
            test "$(node -p "JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8'))[0].integrity" "$pack")" = \
              "$(node -p "JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8')).dist.integrity" "$metadata")"
            echo "$expected_sha256  $filename" | sha256sum --check
          }
          stage_component '@gnolith/diamond' '0.4.0' 'gnolith-diamond-0.4.0.tgz' \
            'ac8e34810a8504bd891b36a199973f2d65ef652555644813c7a36f1c7016c9d2'
          stage_component '@gnolith/taproot' '0.3.0' 'gnolith-taproot-0.3.0.tgz' \
            '2faf3d9bce7811da3fd61629a4cd8b63bb0a6de861d77347030b216ff3ccc347'
          stage_component '@gnolith/workshop' '0.3.3' 'gnolith-workshop-0.3.3.tgz' \
            'c2bc2f3763a3d693662b584d0ed2270936644ab3d23ecd699f0f8b4a2ed0cdc3'
          npm audit signatures
      - id: identity
        shell: bash
        run: |
          tag="${{ github.ref_name }}"
          [[ "$tag" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]
          version="${BASH_REMATCH[1]}"
          test "$(git rev-parse HEAD)" = "${{ github.sha }}"
          test "$(node -p "require('./package.json').version")" = "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - shell: bash
        run: |
          mkdir registry-artifact
          cd registry-artifact
          npm pack "@gnolith/seedbed@${{ steps.identity.outputs.version }}" --json > pack.json
          filename=$(node -p "require('./pack.json')[0].filename")
          packed_integrity=$(node -p "require('./pack.json')[0].integrity")
          registry_integrity=$(npm view "@gnolith/seedbed@${{ steps.identity.outputs.version }}" dist.integrity)
          test "$packed_integrity" = "$registry_integrity"
          mv "$filename" ../gnolith-seedbed-${{ steps.identity.outputs.version }}.tgz
          cd ..
          printf '%s\n' "$registry_integrity" > npm-integrity.txt
      - id: closure
        name: Build the locked content-addressed production closure
        shell: bash
        run: |
          bash scripts/build-production-closure.sh \
            gnolith-seedbed-${{ steps.identity.outputs.version }}.tgz \
            "$(cat npm-integrity.txt)" \
            gnolith-diamond-0.4.0.tgz \
            gnolith-taproot-0.3.0.tgz \
            gnolith-workshop-0.3.3.tgz
          closure_sha=$(cut -d ' ' -f 1 gnolith-production-closure.tar.gz.sha256)
          test "$closure_sha" = "${{ needs.package.outputs.closure_sha256 }}"
          echo "sha256=$closure_sha" >> "$GITHUB_OUTPUT"
      - name: Verify the exact published process assembly
        env:
          SEEDBED_VERSION: ${{ steps.identity.outputs.version }}
        run: npm run test:published
      - id: build
        name: Publish once or recover the exact provenance-attested version image
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SEEDBED_VERSION: ${{ steps.identity.outputs.version }}
          CLOSURE_SHA256: ${{ steps.closure.outputs.sha256 }}
        shell: bash
        run: |
          printf '%s' "$GITHUB_TOKEN" | docker login ghcr.io --username "${{ github.actor }}" --password-stdin
          state=$(node scripts/release-preflight.mjs ghcr \
            'https://api.github.com/orgs/gnolith/packages/container/seedbed/versions?per_page=100&state=active' \
            "$SEEDBED_VERSION" | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).state")
          image="ghcr.io/gnolith/seedbed:$SEEDBED_VERSION"
          if test "$state" = absent; then
            docker buildx create --use --driver docker-container
            docker buildx build . \
              --push \
              --provenance=mode=max \
              --sbom=true \
              --build-arg PRODUCTION_CLOSURE_SHA256="$CLOSURE_SHA256" \
              --build-arg REVISION=${{ github.sha }} \
              --tag "$image" \
              --label org.opencontainers.image.version="$SEEDBED_VERSION" \
              --label org.opencontainers.image.revision=${{ github.sha }} \
              --metadata-file "$RUNNER_TEMP/build-metadata.json"
            digest=$(node -p "require(process.env.RUNNER_TEMP + '/build-metadata.json')['containerimage.digest']")
            echo "created=true" >> "$GITHUB_OUTPUT"
          elif test "$state" = match; then
            digest="sha256:$(docker buildx imagetools inspect --raw "$image" | sha256sum | cut -d ' ' -f 1)"
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            echo 'GHCR preflight returned an impossible state' >&2
            exit 1
          fi
          [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
      - name: Verify the exact immutable version image and extract its SBOM
        shell: bash
        run: |
          docker pull "ghcr.io/gnolith/seedbed@${{ steps.build.outputs.digest }}"
          test "$(docker image inspect "ghcr.io/gnolith/seedbed@${{ steps.build.outputs.digest }}" --format '{{len .Config.ExposedPorts}}')" = "0"
          test "$(docker run --rm --entrypoint id "ghcr.io/gnolith/seedbed@${{ steps.build.outputs.digest }}" -u)" != "0"
          test "$(docker image inspect "ghcr.io/gnolith/seedbed@${{ steps.build.outputs.digest }}" --format '{{index .Config.Labels "org.opencontainers.image.version"}}')" = "${{ steps.identity.outputs.version }}"
          test "$(docker image inspect "ghcr.io/gnolith/seedbed@${{ steps.build.outputs.digest }}" --format '{{index .Config.Labels "org.opencontainers.image.revision"}}')" = "${{ github.sha }}"
          test "$(docker image inspect "ghcr.io/gnolith/seedbed@${{ steps.build.outputs.digest }}" --format '{{index .Config.Labels "org.gnolith.production-closure.sha256"}}')" = "${{ steps.closure.outputs.sha256 }}"
          mkdir image-evidence
          docker buildx imagetools inspect --raw \
            "ghcr.io/gnolith/seedbed@${{ steps.build.outputs.digest }}" > image-evidence/image-manifest.json
          test "sha256:$(sha256sum image-evidence/image-manifest.json | cut -d ' ' -f 1)" = \
            "${{ steps.build.outputs.digest }}"
          docker buildx imagetools inspect \
            "ghcr.io/gnolith/seedbed@${{ steps.build.outputs.digest }}" \
            --format '{{json .SBOM}}' > image-evidence/image-sbom.json
          node - <<'NODE'
          const sbom = require('./image-evidence/image-sbom.json');
          const documents = [];
          const visit = (value) => {
            if (!value || typeof value !== 'object') return;
            if (typeof value.spdxVersion === 'string') documents.push(value);
            for (const child of Object.values(value)) visit(child);
          };
          visit(sbom);
          if (documents.length === 0) throw new Error('image SBOM has no SPDX document');
          for (const document of documents) {
            if (!/^SPDX-2\./u.test(document.spdxVersion)) throw new Error('unsupported SPDX version');
            if (typeof document.SPDXID !== 'string' || !Array.isArray(document.packages)) throw new Error('malformed SPDX document');
          }
          NODE
      - name: Functionally verify the immutable published image
        env:
          SEEDBED_TEST_IMAGE: ghcr.io/gnolith/seedbed@${{ steps.build.outputs.digest }}
          SEEDBED_CLOSURE_SHA256: ${{ steps.closure.outputs.sha256 }}
        run: npm run test:docker
      - id: attestation-preflight
        name: Check for exact existing signed image provenance
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        shell: bash
        run: |
          digest_hex="${IMAGE_DIGEST#sha256:}"
          result=$(node scripts/release-preflight.mjs attestation \
            "https://api.github.com/repos/gnolith/seedbed/attestations/$IMAGE_DIGEST" \
            'ghcr.io/gnolith/seedbed' "$digest_hex")
          state=$(node -p "JSON.parse(process.argv[1]).state" "$result")
          echo "state=$state" >> "$GITHUB_OUTPUT"
      - name: Create signed GitHub provenance for the exact verified image
        if: steps.attestation-preflight.outputs.state == 'absent'
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6
        with:
          subject-name: ghcr.io/gnolith/seedbed
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
      - name: Verify the signed image provenance identity
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          RELEASE_COMMIT: ${{ github.sha }}
          RELEASE_REF: ${{ github.ref }}
        shell: bash
        run: |
          gh attestation verify "oci://ghcr.io/gnolith/seedbed@$IMAGE_DIGEST" \
            --repo gnolith/seedbed \
            --signer-workflow gnolith/seedbed/.github/workflows/release.yml \
            --source-ref "$RELEASE_REF" \
            --source-digest "$RELEASE_COMMIT" >/dev/null
          node --input-type=module - image-evidence/image-provenance-verification.json <<'NODE'
          import { writeFileSync } from 'node:fs';
          const evidence = {
            schemaVersion: 1,
            subject: { name: 'ghcr.io/gnolith/seedbed', digest: process.env.IMAGE_DIGEST },
            repository: 'gnolith/seedbed',
            signerWorkflow: 'gnolith/seedbed/.github/workflows/release.yml',
            sourceRef: process.env.RELEASE_REF,
            sourceDigest: process.env.RELEASE_COMMIT,
            verification: 'gh attestation verify passed',
          };
          writeFileSync(process.argv[2], `${JSON.stringify(evidence, null, 2)}\n`);
          NODE
      - name: Move latest only after exact version verification
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SEEDBED_VERSION: ${{ steps.identity.outputs.version }}
        shell: bash
        run: |
          preflight=$(node scripts/release-preflight.mjs ghcr \
            'https://api.github.com/orgs/gnolith/packages/container/seedbed/versions?per_page=100&state=active' \
            "$SEEDBED_VERSION")
          test "$(node -p "JSON.parse(process.argv[1]).state" "$preflight")" = match
          latest_version=$(node -p "JSON.parse(process.argv[1]).latestVersion ?? ''" "$preflight")
          if test -z "$latest_version" || test "$(printf '%s\n%s\n' "$latest_version" "$SEEDBED_VERSION" | sort -V | tail -n1)" = "$SEEDBED_VERSION" && test "$latest_version" != "$SEEDBED_VERSION"; then
            docker buildx imagetools create --tag ghcr.io/gnolith/seedbed:latest \
              "ghcr.io/gnolith/seedbed@${{ steps.build.outputs.digest }}"
          elif test "$latest_version" != "$SEEDBED_VERSION"; then
            echo "Leaving newer latest version $latest_version unchanged."
            exit 0
          fi
          latest_digest="sha256:$(docker buildx imagetools inspect --raw ghcr.io/gnolith/seedbed:latest | sha256sum | cut -d ' ' -f 1)"
          test "$latest_digest" = "${{ steps.build.outputs.digest }}"
      - id: image-evidence-name
        name: Create the portable image evidence artifact name
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        shell: bash
        run: |
          [[ "$IMAGE_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]
          name=$(node scripts/github-artifact-name.mjs \
            seedbed-image-evidence "$IMAGE_DIGEST" "attempt-$RUN_ATTEMPT")
          echo "name=$name" >> "$GITHUB_OUTPUT"
      - id: upload-image-evidence
        name: Upload the verified image evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ steps.image-evidence-name.outputs.name }}
          path: image-evidence
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

  release:
    needs: [package, publish, image]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: read
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - name: Download the exact npm and staging artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          artifact-ids: ${{ needs.package.outputs.artifact_id }},${{ needs.package.outputs.staging_artifact_id }},${{ needs.image.outputs.evidence_artifact_id }}
          path: ${{ runner.temp }}/release-assets
          merge-multiple: true
      - name: Create or recover the immutable GitHub Release last
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_COMMIT: ${{ github.sha }}
          SEEDBED_VERSION: ${{ needs.package.outputs.version }}
          NPM_SHA256: ${{ needs.package.outputs.sha256 }}
          NPM_INTEGRITY: ${{ needs.package.outputs.integrity }}
          CLOSURE_SHA256: ${{ needs.image.outputs.closure_sha256 }}
          IMAGE_DIGEST: ${{ needs.image.outputs.digest }}
          IMMUTABLE_SETTING_EVIDENCE_TAG: ${{ vars.IMMUTABLE_RELEASES_VERIFIED_FOR }}
        shell: bash
        run: |
          set -euo pipefail
          assets="$RUNNER_TEMP/release-assets"
          test "$IMMUTABLE_SETTING_EVIDENCE_TAG" = "$RELEASE_TAG"
          npm_tarball="$assets/seedbed-publication-$NPM_SHA256.tgz"
          test -f "$npm_tarball" && test ! -L "$npm_tarball"
          test "$(sha256sum "$npm_tarball" | cut -d ' ' -f 1)" = "$NPM_SHA256"
          test "$(cut -d ' ' -f 1 "$assets/gnolith-production-closure.tar.gz.sha256")" = "$CLOSURE_SHA256"
          closure_asset="$assets/seedbed-production-closure-$CLOSURE_SHA256.tar.gz"
          mv "$assets/gnolith-production-closure.tar.gz" "$closure_asset"
          sbom_sha=$(sha256sum "$assets/mcp-runtime-sbom.json" | cut -d ' ' -f 1)
          sbom_asset="$assets/seedbed-mcp-runtime-sbom-$sbom_sha.json"
          mv "$assets/mcp-runtime-sbom.json" "$sbom_asset"
          image_sbom_sha=$(sha256sum "$assets/image-sbom.json" | cut -d ' ' -f 1)
          image_sbom_asset="$assets/seedbed-image-sbom-$image_sbom_sha.json"
          mv "$assets/image-sbom.json" "$image_sbom_asset"
          manifest_sha=$(sha256sum "$assets/image-manifest.json" | cut -d ' ' -f 1)
          test "sha256:$manifest_sha" = "$IMAGE_DIGEST"
          manifest_asset="$assets/seedbed-image-manifest-$manifest_sha.json"
          mv "$assets/image-manifest.json" "$manifest_asset"
          provenance_sha=$(sha256sum "$assets/image-provenance-verification.json" | cut -d ' ' -f 1)
          provenance_asset="$assets/seedbed-image-provenance-verification-$provenance_sha.json"
          mv "$assets/image-provenance-verification.json" "$provenance_asset"
          export IMAGE_SBOM_SHA="$image_sbom_sha" IMAGE_MANIFEST_SHA="$manifest_sha" PROVENANCE_EVIDENCE_SHA="$provenance_sha"
          evidence="$assets/seedbed-release-evidence.json"
          node --input-type=module - "$evidence" <<'NODE'
          import { writeFileSync } from 'node:fs';
          import { createReleaseEvidence } from './scripts/release-preflight.mjs';
          const evidence = createReleaseEvidence({
            releaseTag: process.env.RELEASE_TAG, releaseCommit: process.env.RELEASE_COMMIT,
            seedbedVersion: process.env.SEEDBED_VERSION, npmSha256: process.env.NPM_SHA256,
            npmIntegrity: process.env.NPM_INTEGRITY, closureSha256: process.env.CLOSURE_SHA256,
            imageDigest: process.env.IMAGE_DIGEST, imageSbomSha256: process.env.IMAGE_SBOM_SHA,
            imageManifestSha256: process.env.IMAGE_MANIFEST_SHA,
            provenanceEvidenceSha256: process.env.PROVENANCE_EVIDENCE_SHA,
            immutableSettingEvidenceTag: process.env.IMMUTABLE_SETTING_EVIDENCE_TAG,
          });
          writeFileSync(process.argv[2], `${JSON.stringify(evidence, null, 2)}\n`);
          NODE
          evidence_sha=$(sha256sum "$evidence" | cut -d ' ' -f 1)
          evidence_asset="$assets/seedbed-release-evidence-$evidence_sha.json"
          mv "$evidence" "$evidence_asset"
          expected_assets="$RUNNER_TEMP/expected-release-assets.txt"
          printf '%s\n' \
            "$(basename "$npm_tarball")" \
            "$(basename "$closure_asset")" \
            "$(basename "$sbom_asset")" \
            "$(basename "$image_sbom_asset")" \
            "$(basename "$manifest_asset")" \
            "$(basename "$provenance_asset")" \
            "$(basename "$evidence_asset")" | sort > "$expected_assets"

          release_state=$(node scripts/release-preflight.mjs release \
            "https://api.github.com/repos/gnolith/seedbed/releases/tags/$RELEASE_TAG" \
            "$RELEASE_TAG" | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).state")
          draft_count=$(gh release list --limit 100 --json tagName,isDraft \
            --jq "[.[] | select(.tagName == \"$RELEASE_TAG\" and .isDraft == true)] | length")
          latest_args=(--latest=false)
          if current_latest_tag=$(gh release view --json tagName --jq .tagName 2>/dev/null); then
            [[ "$current_latest_tag" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]
            current_latest_version="${BASH_REMATCH[1]}"
            if test "$(printf '%s\n%s\n' "$current_latest_version" "$SEEDBED_VERSION" | sort -V | tail -n1)" = "$SEEDBED_VERSION" && test "$current_latest_version" != "$SEEDBED_VERSION"; then
              latest_args=(--latest)
            fi
          else
            latest_args=(--latest)
          fi
          if test "$release_state" = absent && test "$draft_count" = 0; then
            gh release create "$RELEASE_TAG" \
              "$npm_tarball" "$closure_asset" "$sbom_asset" "$image_sbom_asset" "$manifest_asset" \
              "$provenance_asset" "$evidence_asset" \
              --verify-tag --title "Seedbed $SEEDBED_VERSION" --notes-from-tag "${latest_args[@]}"
          elif { test "$release_state" = absent || test "$release_state" = draft; } && test "$draft_count" = 1; then
            recovery="$RUNNER_TEMP/release-recovery"
            mkdir "$recovery"
            gh release download "$RELEASE_TAG" --dir "$recovery" || true
            for local_asset in "$npm_tarball" "$closure_asset" "$sbom_asset" "$image_sbom_asset" "$manifest_asset" "$provenance_asset" "$evidence_asset"; do
              remote_asset="$recovery/$(basename "$local_asset")"
              if test -e "$remote_asset"; then
                cmp "$local_asset" "$remote_asset"
              else
                gh release upload "$RELEASE_TAG" "$local_asset"
              fi
            done
            gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name' | sort > "$RUNNER_TEMP/recovery-assets.txt"
            cmp "$expected_assets" "$RUNNER_TEMP/recovery-assets.txt"
            gh release edit "$RELEASE_TAG" --draft=false "${latest_args[@]}"
          elif test "$release_state" = match && test "$draft_count" = 0; then
            echo 'The exact immutable GitHub Release already exists; verifying recovery evidence.'
          else
            echo 'GitHub Release preflight found conflicting published/draft state' >&2
            exit 1
          fi

          gh release verify "$RELEASE_TAG"
          test "$(gh release view "$RELEASE_TAG" --json isDraft,isImmutable,isPrerelease,tagName \
            --jq '[.isDraft, .isImmutable, .isPrerelease, .tagName] | @tsv')" = $'false\ttrue\tfalse\t'"$RELEASE_TAG"
          gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name' | sort > "$RUNNER_TEMP/final-assets.txt"
          cmp "$expected_assets" "$RUNNER_TEMP/final-assets.txt"
          for local_asset in "$npm_tarball" "$closure_asset" "$sbom_asset" "$image_sbom_asset" "$manifest_asset" "$provenance_asset" "$evidence_asset"; do
            gh release verify-asset "$RELEASE_TAG" "$local_asset"
          done
