name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.14.0
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm audit --omit=dev --audit-level=high
      - run: npm pack
      - run: docker build --build-arg SEEDBED_TARBALL=gnolith-seedbed-0.1.0.tgz --build-arg REVISION=${{ github.sha }} --tag seedbed:test .
      - run: npm run test:docker
