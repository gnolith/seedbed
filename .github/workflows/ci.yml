name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  exact-handoffs:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
      - name: Check out exact public source handoffs
        shell: bash
        run: |
          checkout_exact() {
            name="$1"
            revision="$2"
            git init ".handoffs/$name"
            git -C ".handoffs/$name" remote add origin "https://github.com/gnolith/$name.git"
            git -C ".handoffs/$name" fetch --depth=1 origin "$revision"
            git -C ".handoffs/$name" checkout --detach FETCH_HEAD
            test "$(git -C ".handoffs/$name" rev-parse HEAD)" = "$revision"
          }
          checkout_exact diamond 326da7e48d77cddc5a58e21cf65d872ecb9b3b74
          checkout_exact taproot efbdd4c815645d4b20c2c58dc19aacb3e12d45bb
          checkout_exact workshop cf175d587b0f2917a4d8880469c8a8069188e152
      - uses: ./.github/actions/setup-node
      - name: Build and verify exact package handoffs
        shell: bash
        run: |
          npm ci --ignore-scripts --prefix .handoffs/diamond
          npm pack ./.handoffs/diamond --pack-destination "$RUNNER_TEMP"
          echo "ac8e34810a8504bd891b36a199973f2d65ef652555644813c7a36f1c7016c9d2  $RUNNER_TEMP/gnolith-diamond-0.4.0.tgz" | sha256sum --check

          npm install --ignore-scripts --no-save --package-lock=false --prefix .handoffs/taproot "$RUNNER_TEMP/gnolith-diamond-0.4.0.tgz"
          npm pack ./.handoffs/taproot --pack-destination "$RUNNER_TEMP"
          echo "04ce966dbcf0d4bacd43a0f8a34e3b545cfefb55ea9b5fd178334f8afce9de6c  $RUNNER_TEMP/gnolith-taproot-0.2.0.tgz" | sha256sum --check

          npm ci --ignore-scripts --prefix .handoffs/workshop
          npm pack ./.handoffs/workshop --pack-destination "$RUNNER_TEMP"
          echo "98244a8a14d6a42c7969162572fc76c64b7771f959d388674117ec90f9a72d2d  $RUNNER_TEMP/gnolith-workshop-0.2.2.tgz" | sha256sum --check
      - name: Install exact artifacts without changing publishable metadata
        run: >-
          npm install --ignore-scripts --no-save --package-lock=false
          "$RUNNER_TEMP/gnolith-diamond-0.4.0.tgz"
          "$RUNNER_TEMP/gnolith-taproot-0.2.0.tgz"
          "$RUNNER_TEMP/gnolith-workshop-0.2.2.tgz"
      - run: npm run check
      - run: npm audit --omit=dev --audit-level=high
      - name: Test the exact packed assembly
        env:
          DIAMOND_TGZ: ${{ runner.temp }}/gnolith-diamond-0.4.0.tgz
          TAPROOT_TGZ: ${{ runner.temp }}/gnolith-taproot-0.2.0.tgz
          WORKSHOP_TGZ: ${{ runner.temp }}/gnolith-workshop-0.2.2.tgz
        run: npm run test:packed
      - name: Build the image from the same exact artifacts
        shell: bash
        run: |
          npm pack
          cp "$RUNNER_TEMP"/gnolith-diamond-0.4.0.tgz .
          cp "$RUNNER_TEMP"/gnolith-taproot-0.2.0.tgz .
          cp "$RUNNER_TEMP"/gnolith-workshop-0.2.2.tgz .
          docker build --build-arg SEEDBED_TARBALL=gnolith-seedbed-0.1.0.tgz --build-arg REVISION=${{ github.sha }} --tag seedbed:test .
      - run: npm run test:docker
